<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TOEIC学習管理アプリ</title>

<!-- ========================================================
  🔧 STEP 1: Firebaseの設定をここに貼り付けてください
  Firebase Console → プロジェクト設定 → マイアプリ → firebaseConfig
  下の firebaseConfig オブジェクトを自分のものに書き換えてください
======================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW7noTqq51oCUfEEWot8IEG00RHAdhuic",
  authDomain: "toeic-study-fac17.firebaseapp.com",
  databaseURL: "https://toeic-study-fac17-default-rtdb.firebaseio.com",
  projectId: "toeic-study-fac17",
  storageBucket: "toeic-study-fac17.firebasestorage.app",
  messagingSenderId: "884792704448",
  appId: "1:884792704448:web:a1ca1c57edd9c222cd1c25",
  measurementId: "G-TD9Y55L28J"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── DB ヘルパー ──────────────────────────────────────────
window._db = {
  async get(path) {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  },
  async set(path, val) {
    await set(ref(db, path), val);
  },
  async remove(path) {
    await remove(ref(db, path));
  },
  listen(path, cb) {
    onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : null));
  }
};

window._dbReady = true;
document.dispatchEvent(new Event('db-ready'));
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#111111;--text2:#666666;--text3:#999999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --green:#1D9E75;--green2:#0F6E56;
  --blue:#378ADD;--amber:#EF9F27;--red:#E24B4A;
  --r8:8px;--r12:12px;--r16:16px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f0f0f0;--text2:#aaaaaa;--text3:#777777;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  }
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-text-size-adjust:100%}
.app{max-width:430px;margin:0 auto;padding-bottom:80px}
/* loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.topbar-title{font-size:17px;font-weight:600;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}
.icon-btn{background:none;border:0.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer}
.icon-btn:hover{background:var(--bg2)}
/* setup */
.setup-wrap{padding:48px 24px;display:flex;flex-direction:column;gap:20px}
.setup-title{font-size:24px;font-weight:700;color:var(--text)}
.setup-logo{font-size:40px;text-align:center;margin-bottom:8px}
.setup-sub{font-size:14px;color:var(--text2);line-height:1.7}
.big-input{width:100%;border:0.5px solid var(--border);border-radius:var(--r12);padding:14px 16px;font-size:16px;background:var(--bg);color:var(--text);outline:none}
.big-input:focus{border-color:var(--green)}
.btn-primary{width:100%;padding:14px;border-radius:var(--r12);background:var(--green);color:#fff;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--green2)}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.btn-ghost{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;padding:4px 0}
.btn-ghost:hover{color:var(--text2)}
.err-msg{font-size:13px;color:var(--red);padding:4px 0}
/* month nav */
.mnav-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px}
.mnav-btn{background:none;border:0.5px solid var(--border);border-radius:var(--r8);width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--text)}
.mnav-title{font-size:16px;font-weight:600;color:var(--text)}
/* goal bar */
.goal-bar{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--r12);padding:10px 12px;margin:0 16px 4px;cursor:pointer;border:0.5px solid var(--border)}
.goal-bar:hover{border-color:var(--border2)}
.goal-score{font-size:22px;font-weight:700;color:var(--green);text-align:center}
.goal-score-lbl{font-size:10px;color:var(--text3);text-align:center}
.vdiv{width:0.5px;height:32px;background:var(--border);margin:0 4px;flex-shrink:0}
.prog-wrap{height:5px;background:var(--bg3);border-radius:3px;margin-top:5px;overflow:hidden}
.prog-fill{height:5px;border-radius:3px;transition:width .3s}
.rem-good{color:var(--green)} .rem-warn{color:var(--amber)} .rem-bad{color:var(--red)}
/* month tabs */
.month-tabs{display:flex;gap:5px;padding:4px 16px 8px;overflow-x:auto;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:12px;border:0.5px solid var(--border);background:none;cursor:pointer;color:var(--text3)}
.mtab.active{background:var(--green);color:#fff;border-color:var(--green)}
.mtab.hd{color:var(--text);font-weight:600}
/* summary */
.summary-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;padding:0 16px 8px}
.scard{background:var(--bg2);border-radius:var(--r8);padding:7px 4px;text-align:center}
.scard-val{font-size:13px;font-weight:600}
.scard-lbl{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.3}
/* calendar */
.cal-wrap{padding:0 12px}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.wday{text-align:center;font-size:11px;color:var(--text3);padding:3px 0}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dcell{aspect-ratio:1;border-radius:var(--r8);border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg)}
.dcell:hover{background:var(--bg2)}
.dcell.emp{border:none;cursor:default;background:transparent}
.dcell.tdy{border-color:var(--green);border-width:1.5px}
.dcell.hd{background:var(--bg2)}
.dcell.ro{cursor:default}
.dnum{font-size:12px;line-height:1}
.ddots{display:flex;gap:1px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:28px}
.dot{width:5px;height:5px;border-radius:50%}
/* overlay + modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;z-index:100}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.irow{display:flex;align-items:center;margin-bottom:12px;gap:12px}
.ilbl{font-size:14px;color:var(--text);flex:1;display:flex;align-items:center;gap:8px}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tinput{width:72px;border:0.5px solid var(--border);border-radius:var(--r8);padding:7px 10px;font-size:14px;text-align:right;background:var(--bg);color:var(--text);outline:none}
.tinput:focus{border-color:var(--green)}
.tunit{font-size:12px;color:var(--text3);width:14px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:0.5px solid var(--border);margin-top:4px}
.mactions{display:flex;gap:8px;margin-top:16px}
.btn-save{flex:1;padding:13px;border-radius:var(--r12);background:var(--green);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{padding:13px 16px;border-radius:var(--r12);background:none;border:0.5px solid var(--border);font-size:14px;color:var(--text2);cursor:pointer}
.btn-del{padding:13px 14px;border-radius:var(--r12);background:none;border:0.5px solid var(--red);color:var(--red);font-size:13px;cursor:pointer}
.ginput{flex:1;border:0.5px solid var(--border);border-radius:var(--r8);padding:11px 14px;font-size:16px;background:var(--bg);color:var(--text);outline:none}
.ginput:focus{border-color:var(--green)}
.gdiv{height:0.5px;background:var(--border);margin:16px 0}
.glbl{font-size:12px;color:var(--text2);margin-bottom:7px}
/* coach */
.coach-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:12px 16px}
.cstat{background:var(--bg2);border-radius:var(--r8);padding:10px;text-align:center}
.cstat-val{font-size:19px;font-weight:700;color:var(--text)}
.cstat-lbl{font-size:11px;color:var(--text2);margin-top:3px}
.coach-list{padding:8px 16px;display:flex;flex-direction:column;gap:10px}
.sc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:14px;cursor:pointer}
.sc:hover{border-color:var(--border2);background:var(--bg2)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-name{font-size:15px;font-weight:600}
.sc-score{font-size:13px;font-weight:600;color:var(--green)}
.sc-prog-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:6px;overflow:hidden}
.sc-prog{height:4px;border-radius:2px}
.sc-meta{font-size:12px;color:var(--text2)}
.sc-cats{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.sc-cat{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg2)}
.empty-txt{text-align:center;padding:56px 24px;color:var(--text2);font-size:14px;line-height:2}
.back-btn{background:none;border:none;color:var(--green);font-size:14px;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px}
.detail-stat{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:0 16px 12px}
.section-divider{height:0.5px;background:var(--border);margin:12px 16px}
/* view tabs */
.view-tabs{display:flex;border-bottom:0.5px solid var(--border);margin:0 0 4px}
.vtab{flex:1;padding:10px 0;font-size:14px;font-weight:500;text-align:center;background:none;border:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.vtab.active{color:var(--green);border-bottom-color:var(--green)}
/* ranking */
.rank-range{display:flex;gap:5px;padding:10px 16px 6px}
.rrtab{flex:1;padding:6px 0;border-radius:20px;font-size:12px;border:0.5px solid var(--border);background:none;cursor:pointer;color:var(--text3);text-align:center}
.rrtab.active{background:var(--green);color:#fff;border-color:var(--green)}
.rank-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:0 16px 10px}
.rstat{background:var(--bg2);border-radius:var(--r8);padding:8px 6px;text-align:center}
.rstat-val{font-size:18px;font-weight:700;color:var(--text)}
.rstat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.rank-list{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.rank-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border:0.5px solid var(--border);border-radius:var(--r12);background:var(--bg)}
.rank-item.me{border-color:var(--green);background:rgba(29,158,117,0.06)}
.rank-num{font-size:13px;font-weight:600;color:var(--text3);min-width:22px;text-align:center}
.rank-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.rank-bar-bg{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.rank-bar-fg{height:4px;border-radius:2px;background:var(--blue)}
.me .rank-bar-fg{background:var(--green)}
.rank-time{font-size:12px;color:var(--text2);min-width:48px;text-align:right}
.me .rank-time{color:var(--green);font-weight:600}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:28px">📚</div>
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--text2)">読み込み中...</div>
</div>

<div class="app" id="app" style="display:none"></div>

<script>
const CATS=[
  {key:'tan',label:'単語',color:'#378ADD'},
  {key:'bun',label:'文法',color:'#D4537E'},
  {key:'rea',label:'リーディング',color:'#639922'},
  {key:'lis',label:'リスニング',color:'#EF9F27'},
  {key:'kou',label:'公式問題集',color:'#534AB7'}
];
const WD=['日','月','火','水','木','金','土'];
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const now=new Date();

let page='setup';
let myName=localStorage.getItem('myName')||'';
let curYear=now.getFullYear(),curMonth=now.getMonth();
let coachYear=now.getFullYear(),coachMonth=now.getMonth();
let modalDay=null,showGoalModal=false,showGoalModalCoach=false;
let coachPwInput='',coachPwError='';
let allData={},goals={},coachPw='',detailStudent=null;
let studentView='calendar';
let rankRange='week';

function todayStr(){return`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;}
function getDays(y,m){return new Date(y,m+1,0).getDate();}
function getFirst(y,m){return new Date(y,m,1).getDay();}
function ymStr(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function fmtMin(t){
  t=Number(t)||0;
  if(t===0)return'0分';
  const h=Math.floor(t/60),mm=t%60;
  if(h===0)return`${mm}分`;if(mm===0)return`${h}h`;return`${h}h${mm}分`;
}

// ── Firebase DB calls ──────────────────────────────────────
function db(){return window._db;}

async function loadAll(){
  try{
    const pw=await db().get('coach/password');
    if(pw)coachPw=pw;
  }catch(e){}
  try{
    const data=await db().get('students');
    if(data){
      for(const[name,ndata]of Object.entries(data)){
        if(ndata.study)for(const[date,v]of Object.entries(ndata.study))allData[`${name}/${date}`]=v;
        if(ndata.goals)for(const[ym,v]of Object.entries(ndata.goals))goals[`${name}/${ym}`]=v;
      }
    }
  }catch(e){}
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  page=myName?'student':'setup';
  render();
}

async function saveStudyDay(name,date,data){
  try{await db().set(`students/${name}/study/${date}`,data);}catch(e){}
  allData[`${name}/${date}`]=data;
}
async function deleteStudyDay(name,date){
  try{await db().remove(`students/${name}/study/${date}`);}catch(e){}
  delete allData[`${name}/${date}`];
}
async function saveGoal(name,ym,data){
  try{await db().set(`students/${name}/goals/${ym}`,data);}catch(e){}
  goals[`${name}/${ym}`]=data;
}
async function saveCoachPw(pw){
  try{await db().set('coach/password',pw);}catch(e){}
  coachPw=pw;
}

// ── Data helpers ───────────────────────────────────────────
function getStudentMonthData(name,y,m){
  const prefix=`${y}-${String(m+1).padStart(2,'0')}-`;
  const res={};
  for(const[k,v]of Object.entries(allData)){
    if(k.startsWith(name+'/'+prefix))res[k]=v;
  }
  return res;
}
function getStudentMonthTotal(name,y,m){
  const md=getStudentMonthData(name,y,m);
  let t=0;for(const v of Object.values(md))for(const c of CATS)t+=Number(v[c.key]||0);
  return t;
}
function getGoal(name,y,m){return goals[`${name}/${ymStr(y,m)}`]||{};}
function allStudents(){
  const names=new Set();
  for(const k of Object.keys(allData))names.add(k.split('/')[0]);
  for(const k of Object.keys(goals))names.add(k.split('/')[0]);
  return[...names].filter(Boolean);
}

// ── RENDER ─────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=buildPage();
  bindEvents();
}

function buildPage(){
  if(page==='setup')return buildSetup();
  if(page==='student')return buildStudent();
  if(page==='coach_login')return buildCoachLogin();
  if(page==='coach')return buildCoach();
  if(page==='coach_detail')return buildCoachDetail();
  return'';
}

// ── SETUP ──────────────────────────────────────────────────
function buildSetup(){
  return`<div class="setup-wrap">
    <div class="setup-logo">📚</div>
    <div>
      <div class="setup-title">TOEIC学習アプリ</div>
      <div class="setup-sub" style="margin-top:8px">はじめに名前を入力してください。<br>コーチが進捗確認に使います。</div>
    </div>
    <input class="big-input" id="nameInput" placeholder="例：田中 花子" value="${myName}" autocomplete="name">
    <button class="btn-primary" id="startBtn" onclick="doSetup()">はじめる</button>
    <div style="text-align:center"><button class="btn-ghost" onclick="goCoachLogin()">コーチとして入る →</button></div>
  </div>`;
}

async function doSetup(){
  const v=document.getElementById('nameInput')?.value?.trim();
  if(!v)return;
  myName=v;
  localStorage.setItem('myName',myName);
  page='student';render();
}

// ── STUDENT ────────────────────────────────────────────────
function buildStudent(){
  const tabs=`<div class="view-tabs">
    <button class="vtab ${studentView==='calendar'?'active':''}" onclick="setView('calendar')">📅 学習記録</button>
    <button class="vtab ${studentView==='ranking'?'active':''}" onclick="setView('ranking')">🏆 ランキング</button>
  </div>`;
  const body=studentView==='ranking'?buildRanking():`
    <div class="mnav-row">
      <button class="mnav-btn" onclick="prevMonth()">◀</button>
      <span class="mnav-title">${curYear}年 ${MN[curMonth]}</span>
      <button class="mnav-btn" onclick="nextMonth()">▶</button>
    </div>
    ${buildGoalBar(myName,curYear,curMonth,true)}
    ${buildMonthTabs()}
    ${buildSummary(myName,curYear,curMonth)}
    ${buildCalendar(myName,curYear,curMonth,false)}
    ${modalDay?buildDayModal():''}
    ${showGoalModal?buildGoalModal():''}
  `;
  return`
    <div class="topbar">
      <div><div class="topbar-title">${myName}</div><div class="topbar-sub">TOEIC学習記録</div></div>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" onclick="openNameEdit()">✏️ 名前</button>
        <button class="icon-btn" onclick="goCoachLogin()">コーチ ›</button>
      </div>
    </div>
    ${tabs}
    ${body}
    ${showNameEdit?buildNameEditModal():''}
  `;
}

function setView(v){studentView=v;render();}
function setRankRange(r){rankRange=r;render();}

let showNameEdit=false;
function openNameEdit(){showNameEdit=true;render();}
function closeNameEdit(){showNameEdit=false;render();}
function buildNameEditModal(){
  return`<div class="overlay" onclick="if(event.target===this)closeNameEdit()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">名前を変更</div>
      <div class="modal-sub" style="margin-bottom:12px">新しい名前を入力してください</div>
      <input class="big-input" id="newNameInput" value="${myName}" placeholder="例：田中 花子" autocomplete="name">
      <div class="mactions" style="margin-top:12px">
        <button class="btn-cancel" onclick="closeNameEdit()">キャンセル</button>
        <button class="btn-save" onclick="doChangeName()">変更する</button>
      </div>
    </div>
  </div>`;
}
async function doChangeName(){
  const v=document.getElementById('newNameInput')?.value?.trim();
  if(!v)return;
  myName=v;
  localStorage.setItem('myName',myName);
  showNameEdit=false;
  render();
}

function buildRanking(){
  const ranges=[['week','今週'],['month','今月'],['3month','3ヶ月'],['6month','半年'],['all','全期間']];
  const rangeHtml=`<div class="rank-range">${ranges.map(([k,l])=>`<button class="rrtab ${rankRange===k?'active':''}" onclick="setRankRange('${k}')">${l}</button>`).join('')}</div>`;

  const today=new Date();today.setHours(0,0,0,0);
  let cutoff,periodLabel;
  const y=today.getFullYear(),m=today.getMonth();
  if(rankRange==='week'){
    const d=new Date(today);d.setDate(d.getDate()-d.getDay());cutoff=d.getTime();
    periodLabel='';
  } else if(rankRange==='month'){
    cutoff=new Date(y,m,1).getTime();
    periodLabel='';
  } else if(rankRange==='3month'){
    // 4月起算の四半期: 4-6月 / 7-9月 / 10-12月 / 1-3月
    const qStarts=[3,6,9,0]; // 月インデックス(0始まり)
    let qm=qStarts.slice().reverse().find(s=>m>=s&&!(s===0&&m>=3))||0;
    if(m>=3){qm=m>=9?9:m>=6?6:3;}else{qm=0;}
    const qy=(qm===0&&m<3)?y:y;
    cutoff=new Date(qy,qm,1).getTime();
    const qe=new Date(qy,qm+3,0);
    periodLabel=`${qm+1}月〜${qm+3}月`;
  } else if(rankRange==='all'){
    cutoff=0;periodLabel='全期間';
  } else {
    // 4月起算の半期: 4-9月 / 10-3月
    if(m>=3&&m<=8){cutoff=new Date(y,3,1).getTime();periodLabel='4月〜9月';}
    else if(m>=9){cutoff=new Date(y,9,1).getTime();periodLabel='10月〜3月';}
    else{cutoff=new Date(y-1,9,1).getTime();periodLabel='10月〜3月';}
  }

  // 各学生の合計を集計
  const totals={};
  for(const[key,data] of Object.entries(allData)){
    const parts=key.split('/');
    const name=parts[0];
    const dateStr=parts.slice(1).join('/');
    const ts=new Date(dateStr).getTime();
    if(isNaN(ts)||ts<cutoff)continue;
    if(!totals[name])totals[name]=0;
    for(const c of CATS)totals[name]+=Number(data[c.key]||0);
  }

  const ranked=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const maxMin=ranked.length?ranked[0][1]:1;
  const myRank=ranked.findIndex(([n])=>n===myName)+1;
  const totalPpl=ranked.length;
  const totalMin=ranked.reduce((s,[,v])=>s+v,0);

  const statsHtml=`<div class="rank-stats">
    <div class="rstat"><div class="rstat-val">${totalPpl}</div><div class="rstat-lbl">参加人数</div></div>
    <div class="rstat"><div class="rstat-val">${fmtMin(totalMin)}</div><div class="rstat-lbl">みんなの合計</div></div>
    <div class="rstat"><div class="rstat-val">${myRank>0?myRank+'位':'--'}</div><div class="rstat-lbl">自分の順位</div></div>
  </div>
  ${periodLabel?`<div style="text-align:center;font-size:12px;color:var(--text3);margin:-4px 0 8px">📅 ${periodLabel}の合計</div>`:''}
  `;

  const medals=['🥇','🥈','🥉'];
  const listHtml=ranked.length===0
    ?`<div style="text-align:center;padding:40px 0;color:var(--text2);font-size:14px">この期間の記録がまだありません</div>`
    :`<div class="rank-list">${ranked.map(([name,min],i)=>{
      const isMe=name===myName;
      const pct=Math.round(min/maxMin*100);
      const num=i<3?medals[i]:`${i+1}`;
      return`<div class="rank-item ${isMe?'me':''}">
        <span class="rank-num">${num}</span>
        <span class="rank-name">${name}${isMe?' 👈':''}</span>
        <div class="rank-bar-bg"><div class="rank-bar-fg" style="width:${pct}%"></div></div>
        <span class="rank-time">${fmtMin(min)}</span>
      </div>`;
    }).join('')}</div>`;

  return rangeHtml+statsHtml+listHtml;
}

function buildGoalBar(name,y,m,editable){
  const g=getGoal(name,y,m);
  const score=g.score||'--';
  const tH=Number(g.hours||0);
  const dMin=getStudentMonthTotal(name,y,m);
  const pct=tH>0?Math.min(100,Math.round(dMin/60/tH*100)):0;
  const col=pct>=100?'var(--green)':pct>=50?'var(--amber)':'var(--blue)';
  const remH=Math.max(0,tH-dMin/60);
  let remTxt='',remCls='';
  if(tH>0){remTxt=remH<=0?'✓ 目標達成！':`あと ${remH.toFixed(1)}h 必要`;remCls=remH<=0?'rem-good':pct>=60?'rem-warn':'rem-good';}
  else{remTxt=editable?'タップして目標を設定':'目標未設定';remCls='rem-warn';}
  const click=editable?`onclick="openGoalModal()"`:'' ;
  return`<div class="goal-bar" ${click} style="${editable?'':'cursor:default'}">
    <div style="min-width:52px"><div class="goal-score">${score}</div><div class="goal-score-lbl">目標スコア</div></div>
    <div class="vdiv"></div>
    <div style="flex:1">
      <div style="display:flex;align-items:baseline;gap:4px">
        <span style="font-size:16px;font-weight:600;color:var(--text)">${fmtMin(dMin)}</span>
        <span style="font-size:11px;color:var(--text3)">/ 目標 ${tH>0?tH+'h':'未設定'}</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="font-size:11px;margin-top:3px" class="${remCls}">${remTxt}</div>
    </div>
    ${editable?'<span style="font-size:18px;color:var(--text3);margin-left:4px">›</span>':''}
  </div>`;
}

function buildMonthTabs(){
  let h='<div class="month-tabs">';
  for(let i=0;i<12;i++){
    const ac=i===curMonth?'active':'';
    const hd=Object.keys(getStudentMonthData(myName,curYear,i)).length>0&&i!==curMonth?'hd':'';
    h+=`<button class="mtab ${ac} ${hd}" onclick="jumpMonth(${i})">${MN[i]}</button>`;
  }
  return h+'</div>';
}

function buildSummary(name,y,m){
  let h='<div class="summary-row">';
  for(const c of CATS){
    const md=getStudentMonthData(name,y,m);
    let t=0;for(const v of Object.values(md))t+=Number(v[c.key]||0);
    h+=`<div class="scard"><div class="scard-val" style="color:${c.color}">${fmtMin(t)}</div><div class="scard-lbl">${c.label}</div></div>`;
  }
  return h+'</div>';
}

function buildCalendar(name,y,m,readOnly){
  const days=getDays(y,m),first=getFirst(y,m),today=todayStr();
  let h='<div class="cal-wrap"><div class="wdays">';
  for(const w of WD)h+=`<div class="wday">${w}</div>`;
  h+='</div><div class="days-grid">';
  for(let i=0;i<first;i++)h+='<div class="dcell emp"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data=allData[`${name}/${ds}`];
    const tdy=ds===today?'tdy':'',hd=data?'hd':'',ro=readOnly?'ro':'';
    let dots='';
    if(data)for(const c of CATS)if(Number(data[c.key]||0)>0)dots+=`<div class="dot" style="background:${c.color}"></div>`;
    const click=readOnly?'':` onclick="openDay('${ds}')"`;
    h+=`<div class="dcell ${tdy} ${hd} ${ro}"${click}><div class="dnum">${d}</div><div class="ddots">${dots}</div></div>`;
  }
  return h+'</div></div>';
}

function buildDayModal(){
  const[y,m,d]=modalDay.split('-');
  const data=allData[`${myName}/${modalDay}`]||{};
  const total=CATS.reduce((s,c)=>s+Number(data[c.key]||0),0);
  let rows='';
  for(const c of CATS)rows+=`<div class="irow">
    <label class="ilbl"><span class="cdot" style="background:${c.color}"></span>${c.label}</label>
    <input class="tinput" type="number" min="0" max="999" step="5" id="inp_${c.key}" value="${data[c.key]||''}">
    <span class="tunit">分</span>
  </div>`;
  return`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${y}年${parseInt(m)}月${parseInt(d)}日</div>
      <div class="modal-sub">学習時間を入力してください（分）</div>
      ${rows}
      <div class="total-row"><span style="font-size:13px;color:var(--text2)">合計</span><span id="totalVal" style="font-size:16px;font-weight:600">${fmtMin(total)}</span></div>
      <div class="mactions">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-del" onclick="doDeleteDay()">削除</button>
        <button class="btn-save" id="saveBtn" onclick="doSaveDay()">保存</button>
      </div>
    </div>
  </div>`;
}

function buildGoalModal(){
  const g=getGoal(myName,curYear,curMonth);
  return`<div class="overlay" onclick="if(event.target===this)closeGoalModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${curYear}年 ${MN[curMonth]}の目標</div>
      <div class="modal-sub">月間の目標を設定しましょう</div>
      <div class="glbl">目標TOEICスコア</div>
      <div class="irow"><input class="ginput" type="number" id="g_score" min="0" max="990" step="5" value="${g.score||''}" placeholder="例：600"><span class="tunit">点</span></div>
      <div class="gdiv"></div>
      <div class="glbl">月間目標学習時間</div>
      <div class="irow"><input class="ginput" type="number" id="g_hours" min="0" max="300" step="1" value="${g.hours||''}" placeholder="例：30"><span class="tunit">時間</span></div>
      <div class="mactions">
        <button class="btn-cancel" onclick="closeGoalModal()">キャンセル</button>
        <button class="btn-save" onclick="doSaveGoal()">保存</button>
      </div>
    </div>
  </div>`;
}

// ── COACH LOGIN ────────────────────────────────────────────
function buildCoachLogin(){
  return`<div class="setup-wrap">
    <div>
      <div class="setup-title">コーチログイン</div>
      <div class="setup-sub" style="margin-top:8px">${coachPw?'パスワードを入力してください':'初回：パスワードを新規設定します'}</div>
    </div>
    <input class="big-input" id="pwInput" type="password" placeholder="パスワード">
    ${coachPwError?`<div class="err-msg">${coachPwError}</div>`:''}
    <button class="btn-primary" onclick="doCoachLogin()">${coachPw?'ログイン':'パスワードを設定'}</button>
    <div style="text-align:center"><button class="btn-ghost" onclick="backToStudent()">← 生徒画面に戻る</button></div>
  </div>`;
}

async function doCoachLogin(){
  const v=document.getElementById('pwInput')?.value?.trim();
  if(!v){coachPwError='パスワードを入力してください';render();return;}
  if(!coachPw){await saveCoachPw(v);page='coach';coachPwError='';render();}
  else if(v===coachPw){page='coach';coachPwError='';render();}
  else{coachPwError='パスワードが違います';render();}
}

// ── COACH DASHBOARD ────────────────────────────────────────
function buildCoach(){
  const students=allStudents();
  const recorded=students.filter(n=>getStudentMonthTotal(n,coachYear,coachMonth)>0).length;
  const avgMin=students.length?Math.round(students.reduce((s,n)=>s+getStudentMonthTotal(n,coachYear,coachMonth),0)/students.length):0;
  let cards=students.length===0
    ?`<div class="empty-txt">まだデータがありません。<br>生徒がアプリを開いて記録すると<br>ここに表示されます。</div>`
    :students.map(n=>buildStudentCard(n,coachYear,coachMonth)).join('');
  return`
    <div class="topbar">
      <div><div class="topbar-title">コーチビュー</div><div class="topbar-sub">全生徒の進捗確認</div></div>
      <button class="icon-btn" onclick="backToStudent()">← 生徒画面</button>
    </div>
    <div class="mnav-row">
      <button class="mnav-btn" onclick="coachPrev()">◀</button>
      <span class="mnav-title">${coachYear}年 ${MN[coachMonth]}</span>
      <button class="mnav-btn" onclick="coachNext()">▶</button>
    </div>
    <div class="coach-stats">
      <div class="cstat"><div class="cstat-val">${students.length}</div><div class="cstat-lbl">生徒数</div></div>
      <div class="cstat"><div class="cstat-val">${recorded}</div><div class="cstat-lbl">記録あり</div></div>
      <div class="cstat"><div class="cstat-val">${fmtMin(avgMin)}</div><div class="cstat-lbl">平均学習</div></div>
    </div>
    <div class="coach-list">${cards}</div>
  `;
}

function buildStudentCard(name,y,m){
  const g=getGoal(name,y,m);
  const tH=Number(g.hours||0);
  const dMin=getStudentMonthTotal(name,y,m);
  const pct=tH>0?Math.min(100,Math.round(dMin/60/tH*100)):0;
  const col=pct>=100?'var(--green)':pct>=50?'var(--amber)':'var(--blue)';
  const days=Object.keys(getStudentMonthData(name,y,m)).length;
  let cats='';
  for(const c of CATS){
    const md=getStudentMonthData(name,y,m);
    let t=0;for(const v of Object.values(md))t+=Number(v[c.key]||0);
    if(t>0)cats+=`<span class="sc-cat" style="color:${c.color}">${c.label} ${fmtMin(t)}</span>`;
  }
  return`<div class="sc" onclick="openDetail('${name}')">
    <div class="sc-top"><div class="sc-name">${name}</div><div class="sc-score">目標 ${g.score||'--'}点</div></div>
    <div class="sc-prog-wrap"><div class="sc-prog" style="width:${pct}%;background:${col}"></div></div>
    <div class="sc-meta">${fmtMin(dMin)} / 目標${tH>0?tH+'h':'未設定'} ｜ ${days}日記録 ｜ 達成率 ${pct}%</div>
    <div class="sc-cats" style="margin-top:6px">${cats||'<span class="sc-cat" style="color:var(--text3)">まだ記録なし</span>'}</div>
  </div>`;
}

// ── COACH DETAIL ───────────────────────────────────────────
function buildCoachDetail(){
  const name=detailStudent;
  return`
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="back-btn" onclick="backToCoach()">← 一覧</button>
        <div><div class="topbar-title">${name}</div><div class="topbar-sub">${coachYear}年 ${MN[coachMonth]}</div></div>
      </div>
    </div>
    <div style="padding:12px 16px 4px">${buildGoalBar(name,coachYear,coachMonth,false)}</div>
    ${buildSummary(name,coachYear,coachMonth)}
    ${buildCalendar(name,coachYear,coachMonth,true)}
  `;
}

// ── ACTIONS ────────────────────────────────────────────────
function bindEvents(){
  if(page==='setup'){
    document.getElementById('nameInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')doSetup();});
  }
  if(page==='coach_login'){
    document.getElementById('pwInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')doCoachLogin();});
  }
  if(modalDay){
    for(const c of CATS)document.getElementById('inp_'+c.key)?.addEventListener('input',updateTotal);
  }
}

function updateTotal(){
  let t=0;for(const c of CATS)t+=Number(document.getElementById('inp_'+c.key)?.value||0);
  const el=document.getElementById('totalVal');if(el)el.textContent=fmtMin(t);
}

function prevMonth(){if(curMonth===0){curYear--;curMonth=11;}else curMonth--;render();}
function nextMonth(){if(curMonth===11){curYear++;curMonth=0;}else curMonth++;render();}
function jumpMonth(m){curMonth=m;render();}
function coachPrev(){if(coachMonth===0){coachYear--;coachMonth=11;}else coachMonth--;render();}
function coachNext(){if(coachMonth===11){coachYear++;coachMonth=0;}else coachMonth++;render();}
function openDay(ds){modalDay=ds;showGoalModal=false;render();}
function closeModal(){modalDay=null;render();}
function openGoalModal(){showGoalModal=true;modalDay=null;render();}
function closeGoalModal(){showGoalModal=false;render();}
function goCoachLogin(){page='coach_login';coachPwError='';render();}
function backToStudent(){page=myName?'student':'setup';render();}
function openDetail(name){detailStudent=name;page='coach_detail';render();}
function backToCoach(){page='coach';render();}

async function doSaveDay(){
  document.getElementById('saveBtn').disabled=true;
  const data={};
  for(const c of CATS)data[c.key]=Number(document.getElementById('inp_'+c.key)?.value||0);
  await saveStudyDay(myName,modalDay,data);
  modalDay=null;render();
}
async function doDeleteDay(){
  await deleteStudyDay(myName,modalDay);
  modalDay=null;render();
}
async function doSaveGoal(){
  const g={score:document.getElementById('g_score').value,hours:document.getElementById('g_hours').value};
  await saveGoal(myName,ymStr(curYear,curMonth),g);
  showGoalModal=false;render();
}

// ── BOOT ───────────────────────────────────────────────────
if(window._dbReady){loadAll();}
else{document.addEventListener('db-ready',loadAll);}
</script>
